<div class="container mt-4">
  <div class="row">

    <div class="col-md-4">
      <h4 class="mb-3">{{ editingId ? 'Edit' : 'Add' }} Patients</h4>

      <div class="mb-3">
        <label class="form-label">Name</label>
        <input [(ngModel)]="form.name" class="form-control" placeholder="Name" required />
        @if (submitted && !form.name) {
          <span class="text-danger">Name is required</span>
        }
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input [(ngModel)]="form.email" class="form-control" placeholder="Email" required type="email" />
        @if (submitted && !form.email) {
          <span class="text-danger">Email is required</span>
        }
      </div>

      <div class="d-flex gap-2">
        <button (click)="save()" class="btn btn-primary">{{ editingId ? 'Update' : 'Add' }}</button>
        <button (click)="reset()" class="btn btn-outline-secondary">Clear</button>
      </div>
    </div>

    <div class="col-md-8">
      <h4 class="mb-3">Patients list</h4>
      <table class="table">
        <thead class="letter-dark">
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody class="table-light">
          @for (item of items; track item.id) {
            <tr>
              <td>{{ item.name }}</td>
              <td>{{ item.email }}</td>
              <td>
                <div class="d-flex gap-2">
                  <button (click)="edit(item)" class="btn btn-outline-primary">Edit</button>
                  <button (click)="delete(item.id!)" class="btn btn-outline-danger">Delete</button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

  </div>
</div>
